<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Day 14 · Scratch &amp; Reveal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Work+Sans:wght@300;400;500&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#faf3ea;
    --plum:#4a2f3d;
    --rose:#c98a93;
    --gold:#c8a15c;
    --blush:#f1d9d4;
    --ink:#3a2a2f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background: radial-gradient(ellipse at top, var(--blush) 0%, var(--cream) 55%);
    font-family:'Work Sans', sans-serif;
    color:var(--ink);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:40px 20px 60px;
    -webkit-user-select:none;
    user-select:none;
  }
  h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:2rem;
    color:var(--plum);
    margin:10px 0 4px;
    text-align:center;
  }
  .subtitle{
    font-family:'Caveat', cursive;
    font-size:1.4rem;
    color:var(--rose);
    margin-bottom:26px;
    text-align:center;
  }
  .seal{
    width:56px;height:56px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #e6c07f, var(--gold) 70%);
    box-shadow:0 3px 8px rgba(74,47,61,0.3), inset 0 0 0 2px rgba(255,255,255,0.25);
    display:flex;align-items:center;justify-content:center;
    font-family:'Fraunces', serif;
    color:#4a2f3d;
    font-size:1.4rem;
    animation:spin-in 1.1s ease-out;
  }
  @keyframes spin-in{
    from{transform:rotate(-200deg) scale(0.4);opacity:0;}
    to{transform:rotate(0) scale(1);opacity:1;}
  }
  .card-wrap{
    position:relative;
    width:min(88vw, 360px);
    height:240px;
    border-radius:20px;
    margin-bottom:22px;
    box-shadow:0 14px 32px rgba(74,47,61,0.22);
    overflow:hidden;
  }
  .prompt-layer{
    position:absolute;
    inset:0;
    background:var(--cream);
    border:1.5px solid var(--gold);
    border-radius:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:30px;
    text-align:center;
  }
  .prompt-layer .label{
    position:absolute;
    top:16px;
    left:0;right:0;
    font-family:'Work Sans';
    font-size:0.7rem;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--rose);
    text-align:center;
  }
  .prompt-layer .prompt-text{
    font-family:'Fraunces', serif;
    font-size:1.3rem;
    line-height:1.5;
    color:var(--plum);
  }
  canvas{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    border-radius:20px;
    cursor:grab;
    touch-action:none;
  }
  canvas.cleared{
    pointer-events:none;
    opacity:0;
    transition:opacity 0.6s ease;
  }
  .progress-hint{
    font-family:'Caveat', cursive;
    font-size:1.15rem;
    color:var(--rose);
    margin-bottom:22px;
    text-align:center;
    min-height:1.4rem;
  }
  .main-btn{
    font-family:'Work Sans';
    font-size:0.95rem;
    padding:12px 26px;
    border-radius:30px;
    border:none;
    background:var(--gold);
    color:var(--plum);
    font-weight:500;
    cursor:pointer;
    box-shadow:0 6px 16px rgba(200,161,92,0.4);
    transition:transform 0.2s ease;
  }
  .main-btn:hover{transform:translateY(-2px);}
  .footer-note{
    margin-top:28px;
    font-family:'Caveat', cursive;
    font-size:1.15rem;
    color:var(--rose);
    text-align:center;
    max-width:320px;
  }
</style>
</head>
<body>

  <div class="seal">✦</div>
  <h1>Scratch &amp; Reveal</h1>
  <div class="subtitle">day fourteen — patience is part of the gift</div>

  <div class="card-wrap">
    <div class="prompt-layer">
      <div class="label" id="card-label">mystery</div>
      <div class="prompt-text" id="prompt-text">—</div>
    </div>
    <canvas id="scratch-canvas"></canvas>
  </div>

  <div class="progress-hint" id="progress-hint">scratch the gold away with your finger or cursor</div>

  <button class="main-btn" id="new-card-btn">New Card</button>

  <div class="footer-note">read it out loud to each other, slowly, once it's fully clear</div>

<script>
  const prompts = [
    { label:"whisper", text:"Tell me the exact moment today you started thinking about me like that." },
    { label:"confess", text:"If you could freeze one moment from today, which would it be?" },
    { label:"reveal", text:"Send a photo right now " },
    { label:"dare", text:"Send a voice note of you saying "I miss you" in three different accents." },
    { label:"whisper", text:"Describe what you're imagining right now, in one slow sentence." },
    { label:"confess", text:"What's the boldest thing you've thought about saying to me tonight but haven't yet?" },
    { label:"reveal", text:"Tell me what you're wearing(a little sneek peek also), and what you'd take off first." },
    { label:"dare", text:"Trace a slow line down your own neck and tell me if you thought of me." },
    { label:"whisper", text:"What's the first thing you want me to whisper in your ear when we're next together right now?" },
    { label:"confess", text:"Rate how much you want me right now, out of ten, and explain the number." }
  ];

  let usedIndices = [];

  function pickPrompt(){
    if(usedIndices.length >= prompts.length) usedIndices = [];
    let idx;
    do { idx = Math.floor(Math.random()*prompts.length); } while(usedIndices.includes(idx));
    usedIndices.push(idx);
    return prompts[idx];
  }

  const cardWrap = document.querySelector('.card-wrap');
  const canvas = document.getElementById('scratch-canvas');
  const ctx = canvas.getContext('2d');
  const labelEl = document.getElementById('card-label');
  const promptEl = document.getElementById('prompt-text');
  const progressHint = document.getElementById('progress-hint');
  const newCardBtn = document.getElementById('new-card-btn');

  let cleared = false;
  let scratching = false;

  function resizeCanvas(){
    const rect = cardWrap.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    drawFoil();
  }

  function drawFoil(){
    const w = canvas.width, h = canvas.height;
    const grad = ctx.createLinearGradient(0,0,w,h);
    grad.addColorStop(0, "#e6c580");
    grad.addColorStop(0.5, "#c8a15c");
    grad.addColorStop(1, "#a6803f");
    ctx.globalCompositeOperation = "source-over";
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,w,h);

    // subtle diagonal shimmer lines
    ctx.strokeStyle = "rgba(255,255,255,0.15)";
    ctx.lineWidth = 2;
    for(let x=-h; x<w; x+=14){
      ctx.beginPath();
      ctx.moveTo(x,0);
      ctx.lineTo(x+h,h);
      ctx.stroke();
    }

    // center hint text
    ctx.fillStyle = "rgba(74,47,61,0.55)";
    ctx.font = "italic 500 1.05rem Fraunces, serif";
    ctx.textAlign = "center";
    ctx.fillText("scratch here", w/2, h/2 + 6);

    canvas.classList.remove('cleared');
    cleared = false;
    progressHint.textContent = "scratch the gold away with your finger or cursor";
  }

  function newCard(){
    const p = pickPrompt();
    labelEl.textContent = p.label;
    promptEl.textContent = p.text;
    resizeCanvas();
  }

  function getPos(e){
    const rect = canvas.getBoundingClientRect();
    const point = e.touches ? e.touches[0] : e;
    return {
      x: (point.clientX - rect.left) * (canvas.width / rect.width),
      y: (point.clientY - rect.top) * (canvas.height / rect.height)
    };
  }

  function scratchAt(x,y){
    ctx.globalCompositeOperation = "destination-out";
    ctx.beginPath();
    ctx.arc(x,y,26,0,Math.PI*2);
    ctx.fill();
  }

  function checkCleared(){
    if(cleared) return;
    const data = ctx.getImageData(0,0,canvas.width,canvas.height).data;
    let transparent = 0;
    const step = 4 * 8; // sample every 8th pixel for performance
    let sampled = 0;
    for(let i=3; i<data.length; i+=step){
      sampled++;
      if(data[i] < 40) transparent++;
    }
    const pct = transparent / sampled;
    if(pct > 0.55){
      cleared = true;
      canvas.classList.add('cleared');
      progressHint.textContent = "fully revealed ✦";
    }
  }

  function startScratch(e){
    scratching = true;
    const {x,y} = getPos(e);
    scratchAt(x,y);
  }
  function moveScratch(e){
    if(!scratching) return;
    e.preventDefault();
    const {x,y} = getPos(e);
    scratchAt(x,y);
    checkCleared();
  }
  function endScratch(){
    scratching = false;
    checkCleared();
  }

  canvas.addEventListener('mousedown', startScratch);
  canvas.addEventListener('mousemove', moveScratch);
  window.addEventListener('mouseup', endScratch);

  canvas.addEventListener('touchstart', startScratch, {passive:true});
  canvas.addEventListener('touchmove', moveScratch, {passive:false});
  canvas.addEventListener('touchend', endScratch);

  newCardBtn.addEventListener('click', newCard);
  window.addEventListener('resize', () => { if(!cleared) resizeCanvas(); });

  newCard();
</script>

</body>
</html>
