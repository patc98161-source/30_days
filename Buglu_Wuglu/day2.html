<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day 2 — Scratch to Reveal</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Work+Sans:wght@400;500&family=Caveat:wght@600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FBF3EC; --plum: #3D1F2B; --rose: #C87A88; --gold: #D9A94E; --blush: #F3DCE1;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--cream); color: var(--plum);
    font-family: 'Work Sans', sans-serif; display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  h1 { font-family: 'Fraunces', serif; font-weight: 600; margin: 0 0 8px; font-size: 1.6rem; }
  p.sub { margin: 0 0 24px; opacity: 0.75; font-size: 0.95rem; }
  .seal {
    position: fixed; top: 24px; right: 24px; width: 64px; height: 64px; border-radius: 50%;
    background: var(--gold); color: var(--cream); display: flex; align-items: center; justify-content: center;
    font-family: 'Caveat', cursive; font-size: 1.3rem; box-shadow: 0 4px 12px rgba(61,31,43,0.25);
    transform: rotate(-6deg); user-select: none;
  }
  .card {
    background: var(--blush); border-radius: 20px; padding: 40px; max-width: 460px; width: 100%;
    text-align: center; box-shadow: 0 8px 30px rgba(61,31,43,0.12); animation: rise 0.6s ease-out;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .scratch-wrap {
    position: relative; width: 100%; height: 220px; border-radius: 14px; overflow: hidden;
    margin-bottom: 20px; box-shadow: inset 0 0 0 1px rgba(61,31,43,0.08);
  }
  #message {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    padding: 24px; font-family: 'Fraunces', serif; font-size: 1.25rem; line-height: 1.5;
    background: var(--cream); text-align: center;
  }
  canvas {
    position: absolute; inset: 0; cursor: grab; touch-action: none;
  }
  .hint { font-size: 0.85rem; opacity: 0.6; margin-bottom: 4px; }
  button {
    font-family: 'Work Sans', sans-serif; font-weight: 500; background: var(--rose); color: var(--cream);
    border: none; padding: 10px 24px; border-radius: 999px; font-size: 0.9rem; cursor: pointer;
    transition: transform 0.15s ease, background 0.15s ease; display: none;
  }
  button:hover { background: var(--plum); transform: translateY(-2px); }
  button:focus-visible { outline: 3px solid var(--gold); outline-offset: 2px; }
  @media (prefers-reduced-motion: reduce) {
    .card { animation: none; }
    button { transition: none; }
  }
</style>
</head>
<body>
  <div class="seal">Day 2</div>
  <div class="card">
    <h1>Scratch to Reveal</h1>
    <p class="sub">use your finger or mouse — scratch off the gold</p>
    <div class="scratch-wrap" id="wrap">
      <div id="message">You made it to Day 2. Every day this month, there's a little something waiting for you — just because you're worth the effort. 🤍</div>
      <canvas id="canvas"></canvas>
    </div>
    <p class="hint" id="hint">Keep scratching...</p>
    <button id="revealBtn">Reveal it all</button>
  </div>

<script>
  const wrap = document.getElementById('wrap');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const hint = document.getElementById('hint');
  const revealBtn = document.getElementById('revealBtn');

  function sizeCanvas() {
    const rect = wrap.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    drawScratchLayer();
  }

  function drawScratchLayer() {
    const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
    grad.addColorStop(0, '#E8BE6C');
    grad.addColorStop(1, '#D9A94E');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#3D1F2B';
    ctx.font = '600 15px "Work Sans", sans-serif';
    ctx.textAlign = 'center';
    ctx.globalAlpha = 0.85;
    ctx.fillText('scratch here', canvas.width / 2, canvas.height / 2);
    ctx.globalAlpha = 1;
  }

  sizeCanvas();
  window.addEventListener('resize', sizeCanvas);

  let scratching = false;
  let cleared = false;

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const point = e.touches ? e.touches[0] : e;
    return { x: point.clientX - rect.left, y: point.clientY - rect.top };
  }

  function scratch(e) {
    if (cleared) return;
    const { x, y } = getPos(e);
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.arc(x, y, 22, 0, Math.PI * 2);
    ctx.fill();
    checkCleared();
  }

  function checkCleared() {
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
    let transparent = 0;
    for (let i = 3; i < imageData.length; i += 4 * 10) {
      if (imageData[i] === 0) transparent++;
    }
    const ratio = transparent / (imageData.length / 40);
    if (ratio > 0.55 && !cleared) {
      cleared = true;
      canvas.style.transition = 'opacity 0.4s ease';
      canvas.style.opacity = 0;
      hint.textContent = 'Revealed 🤍';
      revealBtn.style.display = 'none';
      setTimeout(() => canvas.remove(), 400);
    } else if (!cleared) {
      revealBtn.style.display = 'inline-block';
    }
  }

  canvas.addEventListener('mousedown', () => scratching = true);
  canvas.addEventListener('mouseup', () => scratching = false);
  canvas.addEventListener('mouseleave', () => scratching = false);
  canvas.addEventListener('mousemove', (e) => { if (scratching) scratch(e); });

  canvas.addEventListener('touchstart', (e) => { scratching = true; scratch(e); });
  canvas.addEventListener('touchend', () => scratching = false);
  canvas.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(e); }, { passive: false });

  revealBtn.addEventListener('click', () => {
    cleared = true;
    canvas.style.transition = 'opacity 0.4s ease';
    canvas.style.opacity = 0;
    hint.textContent = 'Revealed 🤍';
    revealBtn.style.display = 'none';
    setTimeout(() => canvas.remove(), 400);
  });
</script>
</body>
</html>
