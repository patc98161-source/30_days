<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Day 13 · Pop &amp; Play</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Work+Sans:wght@300;400;500&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#fff5f7;
    --plum:#7a2142;
    --rose:#e8748f;
    --gold:#f0a8bb;
    --blush:#ffd6e3;
    --ink:#4a1f2e;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    height:100%;
    overflow-x:hidden;
  }
  body{
    min-height:100vh;
    background: radial-gradient(ellipse at top, var(--blush) 0%, var(--cream) 55%);
    font-family:'Work Sans', sans-serif;
    color:var(--ink);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:40px 20px 60px;
    position:relative;
  }
  h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:2.1rem;
    color:var(--plum);
    margin:10px 0 4px;
    text-align:center;
  }
  .subtitle{
    font-family:'Caveat', cursive;
    font-size:1.4rem;
    color:var(--rose);
    margin-bottom:14px;
    text-align:center;
  }
  .seal{
    width:56px;height:56px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #ffc9d9, var(--gold) 70%);
    box-shadow:0 3px 8px rgba(122,33,66,0.3), inset 0 0 0 2px rgba(255,255,255,0.25);
    display:flex;align-items:center;justify-content:center;
    font-family:'Fraunces', serif;
    color:var(--plum);
    font-size:1.4rem;
    animation:spin-in 1.1s ease-out;
    z-index:3;
  }
  @keyframes spin-in{
    from{transform:rotate(-200deg) scale(0.4);opacity:0;}
    to{transform:rotate(0) scale(1);opacity:1;}
  }

  .sky{
    position:relative;
    width:min(94vw, 460px);
    height:420px;
    border-radius:24px;
    overflow:hidden;
    background:linear-gradient(180deg, #fff0f4 0%, #ffe0ea 100%);
    box-shadow:0 14px 32px rgba(122,33,66,0.18);
    margin:10px 0 18px;
  }

  .balloon{
    position:absolute;
    bottom:-140px;
    width:64px;
    height:80px;
    cursor:pointer;
    animation-name:rise, sway;
    animation-timing-function:linear, ease-in-out;
    animation-iteration-count:1, infinite;
    animation-direction:normal, alternate;
  }
  .balloon .body{
    width:64px;
    height:76px;
    border-radius:50% 50% 50% 50% / 58% 58% 42% 42%;
    position:relative;
    box-shadow:inset -8px -6px 14px rgba(0,0,0,0.12), inset 6px 8px 12px rgba(255,255,255,0.35);
  }
  .balloon .body::after{
    content:'';
    position:absolute;
    left:50%; bottom:-8px;
    transform:translateX(-50%);
    width:0; height:0;
    border-left:6px solid transparent;
    border-right:6px solid transparent;
    border-top:8px solid inherit;
  }
  .balloon .string{
    position:absolute;
    top:76px; left:50%;
    width:1px;
    height:60px;
    background:rgba(122,33,66,0.35);
  }
  .balloon .shine{
    position:absolute;
    top:14px; left:16px;
    width:14px; height:20px;
    background:rgba(255,255,255,0.55);
    border-radius:50%;
    transform:rotate(-20deg);
  }

  @keyframes rise{
    from{ bottom:-140px; }
    to{ bottom:440px; }
  }
  @keyframes sway{
    from{ margin-left:-14px; }
    to{ margin-left:14px; }
  }

  .confetti-canvas{
    position:absolute;
    inset:0;
    pointer-events:none;
  }

  .status{
    font-family:'Caveat', cursive;
    font-size:1.2rem;
    color:var(--rose);
    text-align:center;
    min-height:1.5rem;
    margin-bottom:10px;
  }

  .reveal-card{
    width:min(90vw, 400px);
    background:var(--cream);
    border:1.5px solid var(--gold);
    border-radius:18px;
    padding:24px 28px;
    text-align:center;
    box-shadow:0 12px 26px rgba(122,33,66,0.15);
    opacity:0;
    transform:translateY(10px) scale(0.97);
    transition:opacity 0.5s ease, transform 0.5s ease;
    display:none;
    margin-bottom:10px;
  }
  .reveal-card.show{
    display:block;
    opacity:1;
    transform:translateY(0) scale(1);
  }
  .reveal-card .label{
    font-family:'Work Sans';
    font-size:0.72rem;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--rose);
    margin-bottom:10px;
  }
  .reveal-card .prompt{
    font-family:'Fraunces', serif;
    font-size:1.3rem;
    line-height:1.5;
    color:var(--plum);
  }

  .main-btn{
    font-family:'Work Sans';
    font-size:0.95rem;
    padding:12px 26px;
    border-radius:30px;
    border:none;
    background:var(--gold);
    color:var(--plum);
    font-weight:500;
    cursor:pointer;
    box-shadow:0 6px 16px rgba(240,168,187,0.5);
    transition:transform 0.2s ease;
  }
  .main-btn:hover{transform:translateY(-2px);}

  .footer-note{
    margin-top:24px;
    font-family:'Caveat', cursive;
    font-size:1.15rem;
    color:var(--rose);
    text-align:center;
    max-width:320px;
  }
</style>
</head>
<body>

  <div class="seal">✦</div>
  <h1>Pop &amp; Play</h1>
  <div class="subtitle">day sixteen — no rules, just giggles</div>

  <div class="status" id="status">tap any balloon before it floats away</div>

  <div class="sky" id="sky">
    <canvas class="confetti-canvas" id="confetti"></canvas>
  </div>

  <div class="reveal-card" id="reveal-card">
    <div class="label">popped!</div>
    <div class="prompt" id="prompt-text">—</div>
  </div>

  <button class="main-btn" id="more-btn">More Balloons</button>

  <div class="footer-note">whoever laughs first has to go next</div>

<script>
  const prompts = [
    "Do your best impression of me.",
    "Sing a song for me— full commitment.",
    "Tell me the weirdest fact you know about me.",
    "What would our pet's(Dog) name be if we got one tomorrow?",
    "Do a 10-second victory dance right now, camera on.",
    "Tell a joke. Any joke. Even a bad one.",
    "What's your most embarrassing childhood nickname?",
    "Describe our relationship using only movie titles.",
    "What's the weirdest thing you've ever eaten and liked?",
    "Do your best superhero pose and hold it for 5 seconds.",
    "What's a food combo you love that everyone judges you for?",
    "What's the most ridiculous thing you've Googled this week?",
    "What's your go-to song, no matter how embarrassing?",
    "Tell me a random childhood memory that still makes you laugh."
  ];

  let usedIndices = [];
  function pickPrompt(){
    if(usedIndices.length >= prompts.length) usedIndices = [];
    let idx;
    do { idx = Math.floor(Math.random()*prompts.length); } while(usedIndices.includes(idx));
    usedIndices.push(idx);
    return prompts[idx];
  }

  const sky = document.getElementById('sky');
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  const statusEl = document.getElementById('status');
  const revealCard = document.getElementById('reveal-card');
  const promptText = document.getElementById('prompt-text');
  const moreBtn = document.getElementById('more-btn');

  const balloonColors = ['#e8748f','#f0a8bb','#c14b6f','#ffb3c6','#a83a5c'];
  let spawnTimer = null;
  let activeBalloons = 0;
  const maxBalloons = 5;

  function resizeCanvas(){
    canvas.width = sky.clientWidth;
    canvas.height = sky.clientHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function spawnBalloon(){
    if(activeBalloons >= maxBalloons) return;
    activeBalloons++;

    const b = document.createElement('div');
    b.className = 'balloon';
    const color = balloonColors[Math.floor(Math.random()*balloonColors.length)];
    const left = 10 + Math.random()*70;
    const riseDuration = 6 + Math.random()*3;
    const swayDuration = 1.4 + Math.random()*1;

    b.style.left = left + '%';
    b.style.animationDuration = `${riseDuration}s, ${swayDuration}s`;

    b.innerHTML = `
      <div class="body" style="background:${color}; border-color:${color};">
        <div class="shine"></div>
      </div>
      <div class="string"></div>
    `;

    b.addEventListener('click', () => popBalloon(b, color));
    b.addEventListener('animationend', (e) => {
      if(e.animationName === 'rise'){
        b.remove();
        activeBalloons--;
      }
    });

    sky.appendChild(b);
  }

  function popBalloon(b, color){
    const rect = b.getBoundingClientRect();
    const skyRect = sky.getBoundingClientRect();
    const x = rect.left - skyRect.left + rect.width/2;
    const y = rect.top - skyRect.top + rect.height/2;

    burstConfetti(x, y, color);
    b.remove();
    activeBalloons--;

    const p = pickPrompt();
    promptText.textContent = p;
    revealCard.classList.add('show');
    statusEl.textContent = 'pop!';
  }

  // simple confetti particle system
  let particles = [];
  let rafId = null;

  function burstConfetti(x, y, color){
    for(let i=0;i<26;i++){
      const angle = Math.random()*Math.PI*2;
      const speed = 2 + Math.random()*4;
      particles.push({
        x, y,
        vx: Math.cos(angle)*speed,
        vy: Math.sin(angle)*speed - 2,
        size: 4 + Math.random()*4,
        color: Math.random() > 0.5 ? color : ['#f0a8bb','#ffd6e3','#e8748f','#7a2142'][Math.floor(Math.random()*4)],
        rotation: Math.random()*360,
        vr: (Math.random()-0.5)*10,
        life: 60 + Math.random()*20
      });
    }
    if(!rafId) animateConfetti();
  }

  function animateConfetti(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.12;
      p.rotation += p.vr;
      p.life -= 1;

      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation * Math.PI/180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size*0.6);
      ctx.restore();
    });
    particles = particles.filter(p => p.life > 0 && p.y < canvas.height + 20);

    if(particles.length > 0){
      rafId = requestAnimationFrame(animateConfetti);
    } else {
      rafId = null;
      ctx.clearRect(0,0,canvas.width,canvas.height);
    }
  }

  function startSpawning(){
    spawnBalloon();
    spawnTimer = setInterval(() => {
      if(activeBalloons < maxBalloons) spawnBalloon();
    }, 1400);
  }

  moreBtn.addEventListener('click', () => {
    revealCard.classList.remove('show');
    statusEl.textContent = 'tap any balloon before it floats away';
    for(let i=0;i<2;i++) spawnBalloon();
  });

  startSpawning();
</script>

</body>
</html>
