<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>30 Days of Us</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Work+Sans:wght@400;500&family=Caveat:wght@600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FBF3EC; --plum: #3D1F2B; --rose: #C87A88; --gold: #D9A94E; --blush: #F3DCE1;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--cream); color: var(--plum);
    font-family: 'Work Sans', sans-serif; display: flex; flex-direction: column;
    align-items: center; padding: 48px 24px;
  }
  h1 { font-family: 'Fraunces', serif; font-weight: 600; font-size: 2.2rem; margin: 0 0 8px; text-align: center; }
  p.sub { opacity: 0.75; margin: 0 0 40px; text-align: center; max-width: 420px; }
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 14px; max-width: 700px; width: 100%;
  }
  .day {
    aspect-ratio: 1; border-radius: 16px; display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif; font-size: 1.3rem; text-decoration: none;
    box-shadow: 0 4px 14px rgba(61,31,43,0.10); transition: transform 0.15s ease;
  }
  .day.unlocked { background: var(--rose); color: var(--cream); }
  .day.unlocked:hover { transform: translateY(-3px) scale(1.03); }
  .day.locked { background: var(--blush); color: var(--plum); opacity: 0.55; cursor: default; }
  footer { margin-top: 48px; font-family: 'Caveat', cursive; font-size: 1.2rem; opacity: 0.7; }
</style>
</head>
<body>
  <h1>30 Days of Us</h1>
  <p class="sub">One small thing a day, until your birthday. New days unlock as they're built — check back.</p>
  <div class="grid" id="grid"></div>
  <footer>made with love, one commit at a time</footer>

<script>
  // Update "unlocked" to true as you finish and push each day.
  const unlockedDays = [1, 2, 3]; // <-- add day numbers here as you go

  const grid = document.getElementById('grid');
  for (let n = 1; n <= 30; n++) {
    const isUnlocked = unlockedDays.includes(n);
    const el = document.createElement(isUnlocked ? 'a' : 'div');
    el.className = `day ${isUnlocked ? 'unlocked' : 'locked'}`;
    el.textContent = n;
    if (isUnlocked) el.href = `day${n}.html`;
    grid.appendChild(el);
  }
</script>
</body>
</html>
