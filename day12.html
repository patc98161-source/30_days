<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Day 12 · Same Sky, Different Time</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Work+Sans:wght@300;400;500&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#fff5f7;
    --plum:#7a2142;
    --rose:#e8748f;
    --gold:#f0a8bb;
    --blush:#ffd6e3;
    --ink:#4a1f2e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background: radial-gradient(ellipse at top, var(--blush) 0%, var(--cream) 55%);
    font-family:'Work Sans', sans-serif;
    color:var(--ink);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:40px 20px 60px;
  }
  h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:2rem;
    color:var(--plum);
    margin:10px 0 4px;
    text-align:center;
  }
  .subtitle{
    font-family:'Caveat', cursive;
    font-size:1.4rem;
    color:var(--rose);
    margin-bottom:20px;
    text-align:center;
  }
  .seal{
    width:56px;height:56px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #ffc9d9, var(--gold) 70%);
    box-shadow:0 3px 8px rgba(74,47,61,0.3), inset 0 0 0 2px rgba(255,255,255,0.25);
    display:flex;align-items:center;justify-content:center;
    font-family:'Fraunces', serif;
    color:#7a2142;
    font-size:1.4rem;
    animation:spin-in 1.1s ease-out;
  }
  @keyframes spin-in{
    from{transform:rotate(-200deg) scale(0.4);opacity:0;}
    to{transform:rotate(0) scale(1);opacity:1;}
  }
  .wheel-wrap{
    position:relative;
    width:min(86vw, 360px);
    height:min(86vw, 360px);
    margin:20px 0 24px;
  }
  .pointer{
    position:absolute;
    top:-14px;
    left:50%;
    transform:translateX(-50%);
    width:0;height:0;
    border-left:14px solid transparent;
    border-right:14px solid transparent;
    border-top:22px solid var(--gold);
    filter:drop-shadow(0 2px 3px rgba(74,47,61,0.4));
    z-index:5;
  }
  canvas{
    width:100%;
    height:100%;
    display:block;
    filter:drop-shadow(0 10px 20px rgba(74,47,61,0.25));
    transition:transform 4.5s cubic-bezier(.17,.67,.16,1);
  }
  .hub{
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    width:56px;height:56px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #f3ddb0, var(--gold) 75%);
    border:2px solid var(--cream);
    display:flex;align-items:center;justify-content:center;
    font-family:'Fraunces', serif;
    font-weight:600;
    color:var(--plum);
    font-size:1.05rem;
    cursor:pointer;
    box-shadow:0 4px 12px rgba(74,47,61,0.35), inset 0 0 0 1px rgba(255,255,255,0.3);
    transition:transform 0.15s ease;
    z-index:6;
  }
  .hub:hover{
    transform:translate(-50%,-50%) scale(1.06);
  }
  .result-card{
    width:min(90vw, 380px);
    min-height:120px;
    background:var(--cream);
    border:1.5px solid var(--gold);
    border-radius:18px;
    padding:22px 26px;
    text-align:center;
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    box-shadow:0 10px 24px rgba(74,47,61,0.15);
    margin-bottom:20px;
  }
  .result-card.show{display:flex;}
  .result-label{
    font-family:'Work Sans';
    font-size:0.75rem;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--rose);
    margin-bottom:12px;
  }
  .result-text{
    font-family:'Fraunces', serif;
    font-size:1.25rem;
    line-height:1.5;
    color:var(--plum);
  }
  .timer{
    font-family:'Fraunces', serif;
    font-size:2rem;
    color:var(--gold);
    margin-top:14px;
    display:none;
  }
  .main-btn{
    font-family:'Work Sans';
    font-size:0.95rem;
    padding:12px 26px;
    border-radius:30px;
    border:none;
    background:var(--gold);
    color:var(--plum);
    font-weight:500;
    cursor:pointer;
    box-shadow:0 6px 16px rgba(200,161,92,0.4);
    transition:transform 0.2s ease;
  }
  .main-btn:hover{transform:translateY(-2px);}
  .footer-note{
    margin-top:26px;
    font-family:'Caveat', cursive;
    font-size:1.15rem;
    color:var(--rose);
    text-align:center;
    max-width:320px;
  }
</style>
</head>
<body>

  <div class="seal">✦</div>
  <h1>Same Sky, Different Time</h1>
  <div class="subtitle">day twelve — different rooms, same moment</div>

  <div class="wheel-wrap">
    <div class="pointer"></div>
    <canvas id="wheel" width="360" height="360"></canvas>
    <div class="hub" id="spin-btn">Spin</div>
  </div>

  <div class="result-card" id="result-card">
    <div class="result-label" id="result-label">sync</div>
    <div class="result-text" id="result-text">—</div>
    <div class="timer" id="timer"></div>
  </div>

  <button class="main-btn" id="again-btn" style="display:none;">Spin Again</button>

  <div class="footer-note">say "ready?" before you spin — then do it together, on the count of three</div>

<script>
  const categories = [
    { name:"Sync",    colorA:"#a83a5c", colorB:"#6b1f3d", text:"#ffd6e3" },
    { name:"Reveal",  colorA:"#f5c3d0", colorB:"#e08fa5", text:"#7a2142" },
    { name:"Whisper", colorA:"#ffb8cc", colorB:"#e39cb3", text:"#4a1f2e" },
    { name:"Dare",    colorA:"#c14b6f", colorB:"#8a2f4f", text:"#ffd6e3" },
  ];

  const prompts = {
    Sync: [
      { text:"Put on the same song. Close your eyes and listen to the first verse together.", timer:0 },
      { text:"Both take a slow breath in, hold it, and let it out together on 3.", timer:0 },
      { text:"Hold your hand up to the camera like you're touching palms. Stay there for 20 seconds.", timer:20 },
      { text:"Both close your eyes for 30 seconds and just listen to each other breathing.", timer:30 },
      { text:"Raise a drink and toast to something only the two of you would understand.", timer:0 }
    ],
    Reveal: [
      { text:"Show me the last photo in your camera roll, no explanation first.", timer:0 },
      { text:"Send a voice note right now saying the first thing on your mind.", timer:0 },
      { text:"Tell me about the moment today you missed me most.", timer:0 },
      { text:"Show me what you're wearing right now, however you want to frame it.", timer:0 },
      { text:"Describe the room you're in like I'm actually there with you.", timer:0 },
      { text:"Tell me one thing you're wearing that you'd let me take off first.", timer:0 }
    ],
    Whisper: [
      { text:"What's the first thing you'd do if I walked through your door right now?", timer:0 },
      { text:"Tell me the last dream you had about me.In a romantic tone", timer:0 },
      { text:"What's something about tonight's call that's turning you on?", timer:0 },
      { text:"If you could teleport into my bed for one hour right now, what would you do with it?", timer:0 },
      { text:"What's a memory of us together that you replay when you miss me?", timer:0 },
      { text:"Tell me exactly how you'd greet me at the airport.", timer:0 }
    ],
    Dare: [
      { text:"Bite your lip and hold eye contact with the camera for 10 seconds.", timer:10 },
      { text:"Trace your collarbone with one finger, slowly, on camera.", timer:0 },
      { text:"Whisper my name like I'm right next to you.", timer:0 },
      { text:"Show me your best 'come here' look. No words.", timer:0 },
      { text:"Read your last spicy text to me out loud, in your most serious voice.", timer:0 },
      { text:"Blow a kiss at the camera and hold your hand there like you're catching mine.", timer:0 }
    ]
  };

  const canvas = document.getElementById('wheel');
  const ctx = canvas.getContext('2d');
  const size = 360;
  const center = size/2;
  const radius = size/2 - 6;
  const segAngle = (2*Math.PI)/categories.length;

  function drawWheel(rotation=0){
    ctx.clearRect(0,0,size,size);

    // outer gold ring
    ctx.save();
    ctx.translate(center,center);
    ctx.beginPath();
    ctx.arc(0,0,radius+4,0,Math.PI*2);
    ctx.strokeStyle = "#f0a8bb";
    ctx.lineWidth = 5;
    ctx.stroke();
    ctx.restore();

    ctx.save();
    ctx.translate(center,center);
    ctx.rotate(rotation);

    categories.forEach((cat, i) => {
      const start = i*segAngle;
      const end = start+segAngle;
      const mid = start+segAngle/2;

      // radial gradient per segment, lighter toward the rim
      const gx = Math.cos(mid)*radius*0.55;
      const gy = Math.sin(mid)*radius*0.55;
      const grad = ctx.createRadialGradient(0,0,radius*0.1,gx,gy,radius*0.95);
      grad.addColorStop(0, cat.colorA);
      grad.addColorStop(1, cat.colorB);

      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.arc(0,0,radius,start,end);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();

      // subtle inner shading near hub
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.arc(0,0,radius,start,end);
      ctx.closePath();
      ctx.clip();
      const sheen = ctx.createRadialGradient(0,0,0,0,0,radius);
      sheen.addColorStop(0, "rgba(255,255,255,0.12)");
      sheen.addColorStop(0.4, "rgba(255,255,255,0)");
      ctx.fillStyle = sheen;
      ctx.fillRect(-radius,-radius,radius*2,radius*2);
      ctx.restore();

      // gold divider line
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.lineTo(Math.cos(start)*radius, Math.sin(start)*radius);
      ctx.strokeStyle = "rgba(200,161,92,0.55)";
      ctx.lineWidth = 2;
      ctx.stroke();

      // label
      ctx.save();
      ctx.rotate(mid);
      ctx.textAlign = "right";
      ctx.fillStyle = cat.text;
      ctx.font = "600 20px Fraunces, serif";
      ctx.shadowColor = "rgba(0,0,0,0.25)";
      ctx.shadowBlur = 4;
      ctx.fillText(cat.name, radius-26, 8);
      ctx.restore();
    });

    // center rim circle to frame the hub
    ctx.beginPath();
    ctx.arc(0,0,34,0,Math.PI*2);
    ctx.strokeStyle = "#f0a8bb";
    ctx.lineWidth = 3;
    ctx.stroke();

    ctx.restore();
  }

  drawWheel();

  let appliedDeg = 0;   // total rotation ever applied to the canvas — always increases
  let spinning = false;
  let timerInterval = null;

  const spinBtn = document.getElementById('spin-btn');
  const againBtn = document.getElementById('again-btn');
  const resultCard = document.getElementById('result-card');
  const resultLabel = document.getElementById('result-label');
  const resultText = document.getElementById('result-text');
  const timerEl = document.getElementById('timer');

  function spin(){
    if(spinning) return;
    spinning = true;
    resultCard.classList.remove('show');
    againBtn.style.display = 'none';

    if(timerInterval){
      clearInterval(timerInterval);
      timerInterval = null;
    }

    const extraSpins = 5 + Math.random()*2;
    const randomOffset = Math.random()*360;
    appliedDeg += extraSpins*360 + randomOffset;

    canvas.style.transform = `rotate(${appliedDeg}deg)`;

    setTimeout(() => {
      const normalized = (360 - (appliedDeg % 360)) % 360;
      const idx = Math.floor(normalized / (360/categories.length));
      const cat = categories[idx].name;
      const pool = prompts[cat];
      const pick = pool[Math.floor(Math.random()*pool.length)];

      resultLabel.textContent = cat;
      resultText.textContent = pick.text;
      resultCard.classList.add('show');
      againBtn.style.display = 'inline-block';

      if(pick.timer > 0){
        timerEl.style.display = 'block';
        let t = pick.timer;
        timerEl.textContent = t;
        timerInterval = setInterval(() => {
          t -= 1;
          if(t <= 0){
            clearInterval(timerInterval);
            timerInterval = null;
            timerEl.textContent = "✦";
          } else {
            timerEl.textContent = t;
          }
        }, 1000);
      } else {
        timerEl.style.display = 'none';
      }

      spinning = false;
    }, 4600);
  }

  spinBtn.addEventListener('click', spin);
  againBtn.addEventListener('click', spin);
</script>

</body>
</html>
