<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day 15 — Message in a Bottle</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Work+Sans:wght@400;500&family=Caveat:wght@600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FBF3EC; --plum: #3D1F2B; --rose: #C87A88; --gold: #D9A94E; --blush: #F3DCE1;
    --sea: #8CBBAE;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--cream); color: var(--plum);
    font-family: 'Work Sans', sans-serif; display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  h1 { font-family: 'Fraunces', serif; font-weight: 600; margin: 0 0 8px; font-size: 1.5rem; text-align: center; }
  p.sub { margin: 0 0 20px; opacity: 0.75; font-size: 0.9rem; text-align: center; }
  .seal {
    position: fixed; top: 24px; right: 24px; width: 64px; height: 64px; border-radius: 50%;
    background: var(--gold); color: var(--cream); display: flex; align-items: center; justify-content: center;
    font-family: 'Caveat', cursive; font-size: 1.3rem; box-shadow: 0 4px 12px rgba(61,31,43,0.25);
    transform: rotate(-6deg); user-select: none;
  }
  .card {
    background: var(--blush); border-radius: 20px; padding: 32px; max-width: 400px; width: 100%;
    box-shadow: 0 8px 30px rgba(61,31,43,0.12); animation: rise 0.6s ease-out; text-align: center;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  .scene {
    position: relative; height: 200px; border-radius: 14px; overflow: hidden;
    background: var(--sea); margin-bottom: 8px;
  }
  .scene svg.waves { position: absolute; bottom: 0; left: 0; width: 100%; height: 60px; display: block; }

  .bottle-wrap {
    position: absolute; left: 50%; top: 58%; transform: translate(-50%, -50%);
    cursor: pointer; animation: bob 3.2s ease-in-out infinite;
  }
  @keyframes bob {
    0%, 100% { transform: translate(-50%, -50%) rotate(-3deg); }
    50% { transform: translate(-50%, -55%) rotate(3deg); }
  }
  .bottle-wrap.opened { display: none; }
  .bottle-wrap svg { width: 56px; height: 96px; display: block; filter: drop-shadow(0 4px 6px rgba(61,31,43,0.2)); }

  .tap-hint { font-size: 0.8rem; opacity: 0.6; margin: 10px 0 0; }

  .paper {
    display: none; background: var(--cream); border-radius: 10px; padding: 24px 20px;
    text-align: left; box-shadow: inset 0 0 0 1px rgba(61,31,43,0.06);
  }
  .paper.show { display: block; animation: unfold 0.4s ease-out; }
  @keyframes unfold { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .paper p {
    font-family: 'Fraunces', serif; font-style: italic; font-size: 1.02rem; line-height: 1.6; margin: 0 0 14px;
  }
  .paper .sign { font-family: 'Caveat', cursive; font-size: 1.3rem; text-align: right; opacity: 0.85; }

  @media (prefers-reduced-motion: reduce) {
    .card { animation: none; }
    .bottle-wrap { animation: none; }
    .paper.show { animation: none; }
  }
</style>
</head>
<body>
  <div class="seal">Day 15</div>
  <div class="card">
    <h1>Something Washed Ashore</h1>
    <p class="sub" id="hint">tap the bottle</p>

    <div class="scene">
      <div class="bottle-wrap" id="bottleWrap">
        <svg viewBox="0 0 56 96" xmlns="http://www.w3.org/2000/svg">
          <rect x="22" y="4" width="12" height="14" rx="3" fill="#5C8A7C"/>
          <path d="M18 18 Q16 24 16 34 L16 82 Q16 92 28 92 Q40 92 40 82 L40 34 Q40 24 38 18 Z" fill="#B7D9CE" stroke="#5C8A7C" stroke-width="1.5"/>
          <rect x="21" y="44" width="14" height="34" rx="2" fill="#FBF3EC" opacity="0.95"/>
        </svg>
      </div>
      <svg class="waves" viewBox="0 0 400 60" preserveAspectRatio="none">
        <path d="M0 20 Q 50 5 100 20 T 200 20 T 300 20 T 400 20 V60 H0 Z" fill="#7FA89C"/>
        <path d="M0 35 Q 50 22 100 35 T 200 35 T 300 35 T 400 35 V60 H0 Z" fill="#6B9587"/>
      </svg>
    </div>

    <div class="paper" id="paper">
      <p id="noteText">Day 15. Halfway there, and I'm still finding new ways to say the same true thing: I'm glad you exist, and I'm glad it's you.</p>
      <div class="sign">— Satyam</div>
    </div>
  </div>

<script>
 

  const bottleWrap = document.getElementById('bottleWrap');
  const paper = document.getElementById('paper');
  const hint = document.getElementById('hint');

  bottleWrap.addEventListener('click', () => {
    bottleWrap.classList.add('opened');
    paper.classList.add('show');
    hint.textContent = 'the tide brought this in for you';
  });
</script>
</body>
</html>
