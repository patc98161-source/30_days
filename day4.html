<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day 4 — Crack a Compliment</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Work+Sans:wght@400;500&family=Caveat:wght@600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FBF3EC; --plum: #3D1F2B; --rose: #C87A88; --gold: #D9A94E; --blush: #F3DCE1;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--cream); color: var(--plum);
    font-family: 'Work Sans', sans-serif; display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  h1 { font-family: 'Fraunces', serif; font-weight: 600; margin: 0 0 8px; font-size: 1.6rem; }
  p.sub { margin: 0 0 24px; opacity: 0.75; font-size: 0.95rem; }
  .seal {
    position: fixed; top: 24px; right: 24px; width: 64px; height: 64px; border-radius: 50%;
    background: var(--gold); color: var(--cream); display: flex; align-items: center; justify-content: center;
    font-family: 'Caveat', cursive; font-size: 1.3rem; box-shadow: 0 4px 12px rgba(61,31,43,0.25);
    transform: rotate(-6deg); user-select: none;
  }
  .card {
    background: var(--blush); border-radius: 20px; padding: 40px; max-width: 440px; width: 100%;
    text-align: center; box-shadow: 0 8px 30px rgba(61,31,43,0.12); animation: rise 0.6s ease-out;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  .cookie-wrap { height: 170px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; position: relative; }

  .cookie {
    width: 130px; height: 90px; cursor: pointer; position: relative;
    transition: transform 0.15s ease;
  }
  .cookie:hover { transform: scale(1.04); }
  .cookie svg { width: 100%; height: 100%; display: block; }

  .cookie.shaking { animation: shake 0.45s ease-in-out; pointer-events: none; }
  @keyframes shake {
    0%, 100% { transform: rotate(0deg) translateX(0); }
    15% { transform: rotate(-6deg) translateX(-3px); }
    30% { transform: rotate(5deg) translateX(3px); }
    45% { transform: rotate(-5deg) translateX(-2px); }
    60% { transform: rotate(4deg) translateX(2px); }
    75% { transform: rotate(-3deg) translateX(-1px); }
    90% { transform: rotate(2deg) translateX(1px); }
  }

  .cookie.hidden { display: none; }

  .halves {
    position: absolute; inset: 0; display: none; align-items: center; justify-content: center; gap: 0;
  }
  .halves.show { display: flex; }
  .half { width: 60px; height: 78px; opacity: 0; }
  .half.left { transform: translateX(4px) rotate(0deg); }
  .half.right { transform: translateX(-4px) rotate(0deg); }
  .half.animate.left { animation: flyLeft 0.55s cubic-bezier(.34,1.56,.64,1) forwards; }
  .half.animate.right { animation: flyRight 0.55s cubic-bezier(.34,1.56,.64,1) forwards; }
  @keyframes flyLeft {
    0% { opacity: 1; transform: translateX(4px) translateY(0) rotate(0deg); }
    100% { opacity: 1; transform: translateX(-34px) translateY(6px) rotate(-28deg); }
  }
  @keyframes flyRight {
    0% { opacity: 1; transform: translateX(-4px) translateY(0) rotate(0deg); }
    100% { opacity: 1; transform: translateX(34px) translateY(6px) rotate(28deg); }
  }

  .crumb {
    position: absolute; top: 50%; left: 50%; width: 5px; height: 5px; border-radius: 1px;
    background: #C7963E; opacity: 0; pointer-events: none;
  }
  .crumb.burst { animation: crumbBurst 0.5s ease-out forwards; }
  @keyframes crumbBurst {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0.4); }
  }

  .fortune-slip {
    margin-top: 24px; min-height: 70px; display: flex; align-items: center; justify-content: center;
    padding: 0 12px; opacity: 0; transform: translateY(10px) scale(0.9);
  }
  .fortune-slip.show {
    animation: slipIn 0.45s cubic-bezier(.34,1.56,.64,1) forwards;
  }
  @keyframes slipIn {
    0% { opacity: 0; transform: translateY(10px) scale(0.85); }
    60% { opacity: 1; transform: translateY(-3px) scale(1.03); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  .fortune-slip p {
    font-family: 'Fraunces', serif; font-style: italic; font-size: 1.1rem; line-height: 1.5; margin: 0;
  }

  .hint { font-size: 0.85rem; opacity: 0.6; }

  button {
    font-family: 'Work Sans', sans-serif; font-weight: 500; background: var(--rose); color: var(--cream);
    border: none; padding: 10px 24px; border-radius: 999px; font-size: 0.9rem; cursor: pointer;
    margin-top: 18px; transition: transform 0.15s ease, background 0.15s ease; display: none;
  }
  button.show { display: inline-block; }
  button:hover { background: var(--plum); transform: translateY(-2px); }
  button:focus-visible { outline: 3px solid var(--gold); outline-offset: 2px; }

  @media (prefers-reduced-motion: reduce) {
    .card { animation: none; }
    .cookie, button { transition: none; }
    .cookie.shaking { animation: none; }
    .half.animate.left, .half.animate.right { animation: none; opacity: 1; transform: translateX(-30px); }
    .half.animate.right { transform: translateX(30px); }
    .crumb.burst { animation: none; opacity: 0; }
    .fortune-slip.show { animation: none; opacity: 1; transform: none; }
  }
</style>
</head>
<body>
  <div class="seal">Day 4</div>
  <div class="card">
    <h1>Crack a Compliment</h1>
    <p class="sub" id="hintText">tap the cookie to crack it open</p>

    <div class="cookie-wrap" id="cookieWrap">
      <div class="cookie" id="cookie">
        <svg viewBox="0 0 130 90" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 45 Q10 15 65 15 Q120 15 120 45 Q120 70 65 78 Q10 70 10 45 Z" fill="#E8BE6C" stroke="#C7963E" stroke-width="2"/>
          <path d="M20 40 Q65 55 110 40" fill="none" stroke="#C7963E" stroke-width="2" opacity="0.5"/>
        </svg>
      </div>
      <div class="halves" id="halves">
        <div class="half left" id="halfLeft">
          <svg viewBox="0 0 60 78" xmlns="http://www.w3.org/2000/svg">
            <path d="M50 12 Q10 8 8 39 Q6 62 45 68 L50 12 Z" fill="#E8BE6C" stroke="#C7963E" stroke-width="2"/>
          </svg>
        </div>
        <div class="half right" id="halfRight">
          <svg viewBox="0 0 60 78" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 12 Q50 8 52 39 Q54 62 15 68 L10 12 Z" fill="#E8BE6C" stroke="#C7963E" stroke-width="2"/>
          </svg>
        </div>
      </div>
    </div>

    <div class="fortune-slip" id="slip">
      <p id="fortuneText"></p>
    </div>

    <button id="againBtn">Crack another</button>
  </div>

<script>
 
  const fortunes = [
    "You make hard days feel manageable just by being on the other end of the phone.",
    "There's a kind of steadiness in you that I didn't know I needed until I had it.",
    "You notice things about people that most people miss.",
    "Tu bohot kind aur caring  hai,but pata nhi kyu merko hamesha daati h",
    "You're better at loving people(except me,muze toh pakka maar e gi kisi din) than you give yourself credit for.",
    "Something good is coming your way — and you've earned every bit of it.",
    "The way you care about the people close to you is rare.",
    "You carry more than people realize, and you still show up soft.",
     "Teri aakhe Kaddu,kisi din mai mr jau ga inmai ddob kai",
    "Today is a good day to remember how much you're loved.",
    "Dekh kaddu tu hee meri Lakshmi,Saraswati aur Parwati,you can do anything you want just believe in yourself,Tu Devi h yr meri.",
  ];
  // ---------------------------------------------

  const cookieWrap = document.getElementById('cookieWrap');
  const cookie = document.getElementById('cookie');
  const halves = document.getElementById('halves');
  const halfLeft = document.getElementById('halfLeft');
  const halfRight = document.getElementById('halfRight');
  const slip = document.getElementById('slip');
  const fortuneText = document.getElementById('fortuneText');
  const hintText = document.getElementById('hintText');
  const againBtn = document.getElementById('againBtn');
  let shown = new Set();
  let cracking = false;

  function pickFortune() {
    if (shown.size >= fortunes.length) shown.clear();
    let idx;
    do { idx = Math.floor(Math.random() * fortunes.length); } while (shown.has(idx));
    shown.add(idx);
    return fortunes[idx];
  }

  function spawnCrumbs() {
    for (let i = 0; i < 8; i++) {
      const c = document.createElement('div');
      c.className = 'crumb';
      const angle = Math.random() * Math.PI * 2;
      const dist = 18 + Math.random() * 22;
      c.style.setProperty('--dx', `${Math.cos(angle) * dist}px`);
      c.style.setProperty('--dy', `${Math.sin(angle) * dist - 10}px`);
      cookieWrap.appendChild(c);
      requestAnimationFrame(() => c.classList.add('burst'));
      setTimeout(() => c.remove(), 550);
    }
  }

  function crack() {
    if (cracking) return;
    cracking = true;
    hintText.textContent = 'cracking...';
    cookie.classList.add('shaking');

    setTimeout(() => {
      cookie.classList.add('hidden');
      cookie.classList.remove('shaking');
      halves.classList.add('show');
      halfLeft.classList.add('animate');
      halfRight.classList.add('animate');
      spawnCrumbs();

      fortuneText.textContent = pickFortune();
      setTimeout(() => slip.classList.add('show'), 200);
      hintText.textContent = 'your fortune';
      againBtn.classList.add('show');
      cracking = false;
    }, 450);
  }

  function reset() {
    cookie.classList.remove('hidden');
    halves.classList.remove('show');
    halfLeft.classList.remove('animate');
    halfRight.classList.remove('animate');
    slip.classList.remove('show');
    hintText.textContent = 'tap the cookie to crack it open';
    againBtn.classList.remove('show');
  }

  cookie.addEventListener('click', crack);
  againBtn.addEventListener('click', reset);
</script>
</body>
</html>
