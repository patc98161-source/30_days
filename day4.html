<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day 4 — Crack a Compliment</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Work+Sans:wght@400;500&family=Caveat:wght@600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FBF3EC; --plum: #3D1F2B; --rose: #C87A88; --gold: #D9A94E; --blush: #F3DCE1;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--cream); color: var(--plum);
    font-family: 'Work Sans', sans-serif; display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  h1 { font-family: 'Fraunces', serif; font-weight: 600; margin: 0 0 8px; font-size: 1.6rem; }
  p.sub { margin: 0 0 24px; opacity: 0.75; font-size: 0.95rem; }
  .seal {
    position: fixed; top: 24px; right: 24px; width: 64px; height: 64px; border-radius: 50%;
    background: var(--gold); color: var(--cream); display: flex; align-items: center; justify-content: center;
    font-family: 'Caveat', cursive; font-size: 1.3rem; box-shadow: 0 4px 12px rgba(61,31,43,0.25);
    transform: rotate(-6deg); user-select: none;
  }
  .card {
    background: var(--blush); border-radius: 20px; padding: 40px; max-width: 440px; width: 100%;
    text-align: center; box-shadow: 0 8px 30px rgba(61,31,43,0.12); animation: rise 0.6s ease-out;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  .cookie-wrap { height: 160px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }

  .cookie {
    width: 130px; height: 90px; cursor: pointer; position: relative;
    transition: transform 0.15s ease;
  }
  .cookie:hover { transform: scale(1.04); }
  .cookie svg { width: 100%; height: 100%; display: block; }

  .cookie.cracked { pointer-events: none; }

  .halves { display: none; align-items: center; justify-content: center; gap: 14px; }
  .halves.show { display: flex; }
  .half { width: 60px; height: 70px; }

  .fortune-slip {
    margin-top: 20px; min-height: 70px; display: flex; align-items: center; justify-content: center;
    padding: 0 12px; opacity: 0; transition: opacity 0.4s ease;
  }
  .fortune-slip.show { opacity: 1; }
  .fortune-slip p {
    font-family: 'Fraunces', serif; font-style: italic; font-size: 1.1rem; line-height: 1.5; margin: 0;
  }

  .hint { font-size: 0.85rem; opacity: 0.6; }

  button {
    font-family: 'Work Sans', sans-serif; font-weight: 500; background: var(--rose); color: var(--cream);
    border: none; padding: 10px 24px; border-radius: 999px; font-size: 0.9rem; cursor: pointer;
    margin-top: 18px; transition: transform 0.15s ease, background 0.15s ease; display: none;
  }
  button.show { display: inline-block; }
  button:hover { background: var(--plum); transform: translateY(-2px); }
  button:focus-visible { outline: 3px solid var(--gold); outline-offset: 2px; }

  @media (prefers-reduced-motion: reduce) {
    .card { animation: none; }
    .cookie, button { transition: none; }
  }
</style>
</head>
<body>
  <div class="seal">Day 4</div>
  <div class="card">
    <h1>Crack a Compliment</h1>
    <p class="sub" id="hintText">tap the cookie to crack it open</p>

    <div class="cookie-wrap">
      <div class="cookie" id="cookie">
        <svg viewBox="0 0 130 90" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 45 Q10 15 65 15 Q120 15 120 45 Q120 70 65 78 Q10 70 10 45 Z" fill="#E8BE6C" stroke="#C7963E" stroke-width="2"/>
          <path d="M20 40 Q65 55 110 40" fill="none" stroke="#C7963E" stroke-width="2" opacity="0.5"/>
        </svg>
      </div>
      <div class="halves" id="halves">
        <div class="half">
          <svg viewBox="0 0 60 90" xmlns="http://www.w3.org/2000/svg">
            <path d="M50 20 Q10 15 8 45 Q6 68 45 75 L50 20 Z" fill="#E8BE6C" stroke="#C7963E" stroke-width="2"/>
          </svg>
        </div>
        <div class="half">
          <svg viewBox="0 0 60 90" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 20 Q50 15 52 45 Q54 68 15 75 L10 20 Z" fill="#E8BE6C" stroke="#C7963E" stroke-width="2"/>
          </svg>
        </div>
      </div>
    </div>

    <div class="fortune-slip" id="slip">
      <p id="fortuneText"></p>
    </div>

    <button id="againBtn">Crack another</button>
  </div>

<script>

  const fortunes = [
    "You make hard days feel manageable just by being on the other end of the phone.",
    "There's a kind of magic in your smile that I didn't know but every time it makes me happy.",
    "You're better at loving people than you give yourself credit for.Bs merpai hee nhi aata pyar hamesha marne pitne ki baate krti rehti h",
    "Something good is coming your way — and you've earned every bit of it.",
    "The way you care about the people close to you is cute.Gunnu ko aur muze hamesha daati rehti h,but pyar bhi krti h bohot sara☺️",
    "You carry more than people realize,kisi ko dikhe ya na dikhe kaddu, but i'm proud of you😘.",
    "Today is a good day to remember how much you're loved.",
  ];
  // ---------------------------------------------

  const cookie = document.getElementById('cookie');
  const halves = document.getElementById('halves');
  const slip = document.getElementById('slip');
  const fortuneText = document.getElementById('fortuneText');
  const hintText = document.getElementById('hintText');
  const againBtn = document.getElementById('againBtn');
  let shown = new Set();

  function pickFortune() {
    if (shown.size >= fortunes.length) shown.clear();
    let idx;
    do { idx = Math.floor(Math.random() * fortunes.length); } while (shown.has(idx));
    shown.add(idx);
    return fortunes[idx];
  }

  function crack() {
    cookie.classList.add('cracked');
    cookie.style.display = 'none';
    halves.classList.add('show');
    fortuneText.textContent = pickFortune();
    setTimeout(() => slip.classList.add('show'), 150);
    hintText.textContent = 'your fortune';
    againBtn.classList.add('show');
  }

  function reset() {
    cookie.style.display = 'block';
    cookie.classList.remove('cracked');
    halves.classList.remove('show');
    slip.classList.remove('show');
    hintText.textContent = 'tap the cookie to crack it open';
    againBtn.classList.remove('show');
  }

  cookie.addEventListener('click', crack);
  againBtn.addEventListener('click', reset);
</script>
</body>
</html>
