<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day 10 — Love Letter Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Work+Sans:wght@400;500&family=Caveat:wght@600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FBF3EC; --plum: #3D1F2B; --rose: #C87A88; --gold: #D9A94E; --blush: #F3DCE1;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--cream); color: var(--plum);
    font-family: 'Work Sans', sans-serif; display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  h1 { font-family: 'Fraunces', serif; font-weight: 600; margin: 0 0 8px; font-size: 1.6rem; }
  p.sub { margin: 0 0 20px; opacity: 0.75; font-size: 0.95rem; }
  .seal {
    position: fixed; top: 24px; right: 24px; width: 64px; height: 64px; border-radius: 50%;
    background: var(--gold); color: var(--cream); display: flex; align-items: center; justify-content: center;
    font-family: 'Caveat', cursive; font-size: 1.3rem; box-shadow: 0 4px 12px rgba(61,31,43,0.25);
    transform: rotate(-6deg); user-select: none; z-index: 2;
  }
  .card {
    background: var(--blush); border-radius: 20px; padding: 32px 28px 28px; max-width: 520px; width: 100%;
    box-shadow: 0 8px 30px rgba(61,31,43,0.12); animation: rise 0.6s ease-out;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  .envelope {
    background: var(--cream); border-radius: 14px; padding: 20px 18px 18px;
    box-shadow: inset 0 0 0 1px rgba(61,31,43,0.08); margin-bottom: 20px;
  }
  .envelope-label {
    font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em;
    opacity: 0.55; margin-bottom: 12px; text-align: center;
  }
  .slots { display: flex; flex-direction: column; gap: 10px; }
  .slot {
    min-height: 48px; border: 2px dashed rgba(217,169,78,0.65); border-radius: 12px;
    padding: 8px 12px; display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 6px;
    background: rgba(251,243,236,0.6); transition: border-color 0.15s ease, background 0.15s ease;
    cursor: pointer;
  }
  .slot.drag-over { border-color: var(--rose); background: rgba(243,220,225,0.9); }
  .slot.filled { border-style: solid; border-color: rgba(61,31,43,0.12); cursor: default; }
  .slot-hint { font-size: 0.78rem; opacity: 0.45; pointer-events: none; }
  .slot.filled .slot-hint { display: none; }

  .chip-bank-label {
    font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.06em;
    opacity: 0.6; margin-bottom: 10px;
  }
  .chip-bank {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 22px;
  }
  .chip {
    background: var(--rose); color: var(--cream); padding: 8px 14px; border-radius: 999px;
    font-size: 0.85rem; cursor: grab; user-select: none; touch-action: none;
    transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 2px 8px rgba(61,31,43,0.12);
  }
  .chip:hover { transform: translateY(-2px); }
  .chip:active { cursor: grabbing; }
  .chip.selected { outline: 3px solid var(--gold); outline-offset: 2px; transform: translateY(-2px); }
  .chip.used { opacity: 0.35; pointer-events: none; }

  .slot-chip {
    background: var(--plum); color: var(--cream); padding: 6px 12px; border-radius: 999px;
    font-size: 0.82rem; display: inline-flex; align-items: center; gap: 6px;
  }
  .slot-chip button {
    background: none; border: none; color: var(--cream); padding: 0; font-size: 1rem;
    line-height: 1; cursor: pointer; opacity: 0.7;
  }
  .slot-chip button:hover { opacity: 1; transform: none; }

  .actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  button {
    font-family: 'Work Sans', sans-serif; font-weight: 500; background: var(--rose); color: var(--cream);
    border: none; padding: 11px 24px; border-radius: 999px; font-size: 0.92rem; cursor: pointer;
    transition: transform 0.15s ease, background 0.15s ease, opacity 0.15s ease;
  }
  button:hover:not(:disabled) { background: var(--plum); transform: translateY(-2px); }
  button:focus-visible { outline: 3px solid var(--gold); outline-offset: 2px; }
  button:disabled { opacity: 0.45; cursor: not-allowed; }
  button.secondary { background: transparent; color: var(--plum); box-shadow: inset 0 0 0 1.5px rgba(61,31,43,0.25); }
  button.secondary:hover:not(:disabled) { background: rgba(61,31,43,0.06); }

  .letter-preview {
    display: none; margin-top: 22px; background: var(--cream); border-radius: 14px;
    padding: 24px 22px; text-align: left; box-shadow: inset 0 0 0 1px rgba(61,31,43,0.08);
  }
  .letter-preview.visible { display: block; animation: rise 0.5s ease-out; }
  .letter-preview p {
    font-family: 'Fraunces', serif; font-size: 1.05rem; line-height: 1.65; margin: 0 0 12px;
    white-space: pre-line;
  }
  .letter-preview p:last-child { margin-bottom: 0; }
  .letter-sign { font-family: 'Caveat', cursive; font-size: 1.25rem; margin-top: 16px; opacity: 0.9; }

  .hint { font-size: 0.8rem; opacity: 0.55; text-align: center; margin-top: 14px; }

  @media (prefers-reduced-motion: reduce) {
    .card, .letter-preview.visible { animation: none; }
    button, .chip { transition: none; }
  }
</style>
</head>
<body>
  <div class="seal">Day 10</div>
  <div class="card">
    <h1>Build a Love Letter</h1>
    <p class="sub">drag words into the envelope — or tap a word, then tap a line</p>

    <div class="envelope">
      <div class="envelope-label">Your letter</div>
      <div class="slots" id="slots">
        <div class="slot" data-slot="0"><span class="slot-hint">Opening — how you feel</span></div>
        <div class="slot" data-slot="1"><span class="slot-hint">Something only you would say</span></div>
        <div class="slot" data-slot="2"><span class="slot-hint">A small detail you love</span></div>
        <div class="slot" data-slot="3"><span class="slot-hint">How you want to end</span></div>
      </div>
    </div>

    <div class="chip-bank-label">Word bank</div>
    <div class="chip-bank" id="chipBank"></div>

    <div class="actions">
      <button id="sealBtn" disabled>Seal the letter</button>
      <button id="resetBtn" class="secondary" type="button">Start over</button>
    </div>
    <p class="hint" id="statusHint">Fill all four lines to seal it.</p>

    <div class="letter-preview" id="preview">
      <p id="letterText"></p>
      <div class="letter-sign">— always yours</div>
    </div>
  </div>

<script>
  // ---- EDIT THIS LIST WITH YOUR OWN WORDS / PHRASES ----
  const chips = [
    "I love you",
    "your laugh",
    "the way you listen",
    "every ordinary Tuesday",
    "when you get excited about small things",
    "how safe I feel with you",
    "your terrible jokes",
    "the look you give me when you're proud",
    "that you always show up",
    "our late-night talks",
    "your patience with me",
    "how you remember the tiny details",
    "you make hard days softer",
    "I choose you",
    "forever isn't long enough",
    "thank you for being you",
  ];
  // -------------------------------------------------------

  const slotLabels = [
    "Opening — how you feel",
    "Something only you would say",
    "A small detail you love",
    "How you want to end",
  ];

  const chipBank = document.getElementById('chipBank');
  const slotEls = [...document.querySelectorAll('.slot')];
  const sealBtn = document.getElementById('sealBtn');
  const resetBtn = document.getElementById('resetBtn');
  const preview = document.getElementById('preview');
  const letterText = document.getElementById('letterText');
  const statusHint = document.getElementById('statusHint');

  const slotValues = [null, null, null, null];
  let selectedChipId = null;
  let draggedChipId = null;

  function renderChipBank() {
    chipBank.innerHTML = '';
    chips.forEach((text, id) => {
      const el = document.createElement('div');
      el.className = 'chip';
      el.draggable = true;
      el.dataset.id = id;
      el.textContent = text;
      chipBank.appendChild(el);
    });
    syncChipStates();
  }

  function chipInUse(id) {
    return slotValues.some((slot) => slot && slot.id === id);
  }

  function syncChipStates() {
    chipBank.querySelectorAll('.chip').forEach((el) => {
      const id = Number(el.dataset.id);
      el.classList.toggle('used', chipInUse(id));
      el.classList.toggle('selected', selectedChipId === id);
    });
    sealBtn.disabled = slotValues.some((v) => !v);
    statusHint.textContent = sealBtn.disabled
      ? `Fill all four lines to seal it. (${slotValues.filter(Boolean).length}/4)`
      : 'Ready when you are.';
  }

  function renderSlot(index) {
    const slot = slotEls[index];
    const value = slotValues[index];
    slot.innerHTML = '';
    if (!value) {
      slot.classList.remove('filled');
      const hint = document.createElement('span');
      hint.className = 'slot-hint';
      hint.textContent = slotLabels[index];
      slot.appendChild(hint);
      return;
    }
    slot.classList.add('filled');
    const chip = document.createElement('span');
    chip.className = 'slot-chip';
    chip.textContent = value.text;
    const remove = document.createElement('button');
    remove.type = 'button';
    remove.setAttribute('aria-label', 'Remove word');
    remove.textContent = '×';
    remove.addEventListener('click', (e) => {
      e.stopPropagation();
      slotValues[index] = null;
      renderSlot(index);
      syncChipStates();
    });
    chip.appendChild(remove);
    slot.appendChild(chip);
  }

  function placeChip(slotIndex, chipId) {
    if (chipInUse(chipId)) return;
    if (slotValues[slotIndex]) return;
    slotValues[slotIndex] = { id: chipId, text: chips[chipId] };
    selectedChipId = null;
    renderSlot(slotIndex);
    syncChipStates();
  }

  function assembleLetter() {
    const [a, b, c, d] = slotValues.map((v) => v.text);
    return [
      'Dear you,',
      '',
      `${a} — ${b}, and ${c}.`,
      '',
      `${d}.`,
    ].join('\n');
  }

  chipBank.addEventListener('click', (e) => {
    const chip = e.target.closest('.chip');
    if (!chip || chip.classList.contains('used')) return;
    const id = Number(chip.dataset.id);
    selectedChipId = selectedChipId === id ? null : id;
    syncChipStates();
  });

  chipBank.addEventListener('dragstart', (e) => {
    const chip = e.target.closest('.chip');
    if (!chip || chip.classList.contains('used')) {
      e.preventDefault();
      return;
    }
    draggedChipId = Number(chip.dataset.id);
    e.dataTransfer.setData('text/plain', String(draggedChipId));
    e.dataTransfer.effectAllowed = 'move';
  });

  chipBank.addEventListener('dragend', () => {
    draggedChipId = null;
  });

  slotEls.forEach((slot, index) => {
    slot.addEventListener('click', () => {
      if (selectedChipId !== null && !slotValues[index]) {
        placeChip(index, selectedChipId);
      }
    });

    slot.addEventListener('dragover', (e) => {
      e.preventDefault();
      if (!slotValues[index]) slot.classList.add('drag-over');
    });

    slot.addEventListener('dragleave', () => slot.classList.remove('drag-over'));

    slot.addEventListener('drop', (e) => {
      e.preventDefault();
      slot.classList.remove('drag-over');
      const id = Number(e.dataTransfer.getData('text/plain') || draggedChipId);
      if (Number.isNaN(id) || slotValues[index]) return;
      placeChip(index, id);
    });
  });

  sealBtn.addEventListener('click', () => {
    letterText.textContent = assembleLetter();
    preview.classList.add('visible');
    statusHint.textContent = 'Sealed with love.';
    try {
      const visited = JSON.parse(localStorage.getItem('buglu_days_visited') || '[]');
      if (!visited.includes(10)) {
        visited.push(10);
        localStorage.setItem('buglu_days_visited', JSON.stringify(visited));
      }
    } catch (_) {}
  });

  resetBtn.addEventListener('click', () => {
    for (let i = 0; i < slotValues.length; i++) {
      slotValues[i] = null;
      renderSlot(i);
    }
    selectedChipId = null;
    preview.classList.remove('visible');
    letterText.textContent = '';
    syncChipStates();
  });

  slotEls.forEach((_, i) => renderSlot(i));
  renderChipBank();
</script>
</body>
</html>
