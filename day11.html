<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Day 11 · For Your Eyes Only</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Work+Sans:wght@300;400;500&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#faf3ea;
    --plum:#4a2f3d;
    --rose:#c98a93;
    --gold:#c8a15c;
    --blush:#f1d9d4;
    --ink:#3a2a2f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background: radial-gradient(ellipse at top, var(--blush) 0%, var(--cream) 55%);
    font-family:'Work Sans', sans-serif;
    color:var(--ink);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:40px 20px 60px;
  }
  h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:2.1rem;
    color:var(--plum);
    margin:10px 0 4px;
    text-align:center;
  }
  .subtitle{
    font-family:'Caveat', cursive;
    font-size:1.4rem;
    color:var(--rose);
    margin-bottom:28px;
    text-align:center;
  }
  .seal{
    width:56px;height:56px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #e6c07f, var(--gold) 70%);
    box-shadow:0 3px 8px rgba(74,47,61,0.3), inset 0 0 0 2px rgba(255,255,255,0.25);
    display:flex;align-items:center;justify-content:center;
    font-family:'Fraunces', serif;
    color:#4a2f3d;
    font-size:1.4rem;
    animation:spin-in 1.1s ease-out;
  }
  @keyframes spin-in{
    from{transform:rotate(-200deg) scale(0.4);opacity:0;}
    to{transform:rotate(0) scale(1);opacity:1;}
  }
  .decks{
    display:flex;
    gap:16px;
    margin-bottom:30px;
    flex-wrap:wrap;
    justify-content:center;
  }
  .deck-btn{
    font-family:'Work Sans', sans-serif;
    font-size:0.92rem;
    letter-spacing:0.04em;
    text-transform:uppercase;
    padding:10px 20px;
    border-radius:30px;
    border:1.5px solid var(--rose);
    background:transparent;
    color:var(--plum);
    cursor:pointer;
    transition:all 0.25s ease;
  }
  .deck-btn.active, .deck-btn:hover{
    background:var(--rose);
    color:var(--cream);
    border-color:var(--rose);
  }
  .stage{
    perspective:1400px;
    width:min(90vw, 380px);
    height:480px;
    margin-bottom:26px;
  }
  .card{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    transition:transform 0.7s cubic-bezier(.4,.2,.2,1);
    cursor:pointer;
  }
  .card.flipped{
    transform:rotateY(180deg);
  }
  .face{
    position:absolute;
    inset:0;
    border-radius:20px;
    backface-visibility:hidden;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:32px;
    text-align:center;
    box-shadow:0 12px 30px rgba(74,47,61,0.18);
  }
  .front{
    background:linear-gradient(160deg, var(--plum), #5e3a4d);
    color:var(--blush);
  }
  .front .mark{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-size:1.6rem;
    color:var(--gold);
    margin-bottom:14px;
  }
  .front .hint{
    font-family:'Caveat', cursive;
    font-size:1.3rem;
    color:var(--blush);
    opacity:0.85;
  }
  .back{
    background:var(--cream);
    color:var(--ink);
    transform:rotateY(180deg);
    border:1.5px solid var(--gold);
  }
  .back .label{
    font-family:'Work Sans';
    font-size:0.75rem;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--rose);
    margin-bottom:18px;
  }
  .back .prompt{
    font-family:'Fraunces', serif;
    font-size:1.35rem;
    line-height:1.5;
    color:var(--plum);
  }
  .controls{
    display:flex;
    gap:14px;
  }
  .main-btn{
    font-family:'Work Sans';
    font-size:0.95rem;
    padding:12px 26px;
    border-radius:30px;
    border:none;
    background:var(--gold);
    color:var(--plum);
    font-weight:500;
    cursor:pointer;
    box-shadow:0 6px 16px rgba(200,161,92,0.4);
    transition:transform 0.2s ease;
  }
  .main-btn:hover{transform:translateY(-2px);}
  .main-btn.ghost{
    background:transparent;
    border:1.5px solid var(--plum);
    color:var(--plum);
    box-shadow:none;
  }
  .footer-note{
    margin-top:30px;
    font-family:'Caveat', cursive;
    font-size:1.15rem;
    color:var(--rose);
    text-align:center;
    max-width:340px;
  }
</style>
</head>
<body>

  <div class="seal">✦</div>
  <h1>For Your Eyes Only</h1>
  <div class="subtitle">day eleven — a little closer, a little slower</div>

  <div class="decks">
    <button class="deck-btn active" data-deck="whisper">Whisper</button>
    <button class="deck-btn" data-deck="touch">Touch</button>
    <button class="deck-btn" data-deck="confess">Confess</button>
  </div>

  <div class="stage">
    <div class="card" id="card">
      <div class="face front">
        <div class="mark">✦</div>
        <div class="hint">tap to draw a card</div>
      </div>
      <div class="face back">
        <div class="label" id="deck-label">whisper</div>
        <div class="prompt" id="prompt-text">—</div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="main-btn ghost" id="reset-btn">Flip Back</button>
    <button class="main-btn" id="draw-btn">Draw Again</button>
  </div>

  <div class="footer-note">no rush, no rules — just the two of us, and whatever this card asks for</div>

<script>
  const decks = {
    whisper: [
      "Tell me the first moment you knew you wanted to kiss me.",
      "What's a thought about me you've never said out loud?",
      "Describe, without touching, exactly where you want my hands right now.",
      "If tonight had a soundtrack, what's the one song playing right now?",
      "Tell me something about my body you find beautiful, slowly.",
      "What do you think about right before you fall asleep next to me?",
      "Whisper the next thing you want to happen tonight."
    ],
    touch: [
      "Put your hand where you wish mine was right now. Tell me where you put it.",
"Close your eyes and describe what my hands would be doing if I were there.",
"Trace one finger slowly down your own arm the way I would — and tell me how it feels.",
"Look at the camera like I'm actually in the room with you. Hold it for 10 seconds.",
"Tell me exactly where you'd want my mouth first if I walked in right now.",
"Tell me what you're wearing right now, slowly, like you're deciding whether to take it off."
    ],
    confess: [
      "What's something you want more of from me, physically?",
      "Tell me one fantasy you've been too shy to say out loud.",
      "What's the most turned on you've ever been by something small I did?",
      "Describe, in detail, how you want tonight to end.",
      "What part of my body do you think about most when I'm not around?",
      "Tell me exactly what you want me to do next.",
      "What's one thing you've never told me you want to try together,agr nhi soch toh abhi soch lai?",
      "If I could do one thing to you right now, what would you ask for?"
    ]
  };

  let currentDeck = "whisper";
  const card = document.getElementById('card');
  const promptText = document.getElementById('prompt-text');
  const deckLabel = document.getElementById('deck-label');
  const drawBtn = document.getElementById('draw-btn');
  const resetBtn = document.getElementById('reset-btn');
  const deckButtons = document.querySelectorAll('.deck-btn');

  let lastIndex = -1;

  function drawCard(){
    const pool = decks[currentDeck];
    let idx;
    do { idx = Math.floor(Math.random()*pool.length); } while(idx === lastIndex && pool.length>1);
    lastIndex = idx;
    promptText.textContent = pool[idx];
    deckLabel.textContent = currentDeck;
    card.classList.add('flipped');
  }

  card.addEventListener('click', () => {
    if(!card.classList.contains('flipped')){
      drawCard();
    } else {
      card.classList.remove('flipped');
    }
  });

  drawBtn.addEventListener('click', drawCard);
  resetBtn.addEventListener('click', () => card.classList.remove('flipped'));

  deckButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      deckButtons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentDeck = btn.dataset.deck;
      card.classList.remove('flipped');
    });
  });
</script>

</body>
</html>
